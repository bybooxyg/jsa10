<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Admin - Duyệt bài</title>

<style>
body { font-family: Arial; background:#f4f6fa; padding:40px; }
.card {
  background:white;
  padding:20px;
  margin-bottom:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,.08);
}
button {
  padding:8px 14px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-right:10px;
}
.approve { background:#22c55e; color:white; }
.reject { background:#ef4444; color:white; }
.status { font-weight:bold; }
</style>
</head>

<body>
 
<div id="navbar-container"></div>
<script src="navbar.js"></script>
<script>loadNavbar();</script>

<h1>Trang Admin Duyệt Bài</h1>
<div id="adminList"></div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const currentUser = JSON.parse(localStorage.getItem("currentUser"));

  // 🔥 Chỉ admin mới được vào
//   if (!currentUser || currentUser.role !== "admin") {
//     alert("Bạn không có quyền truy cập");
//     window.location.href = "home.html";
//     return;
//   }

  const adminList = document.getElementById("adminList");
  let newsList = JSON.parse(localStorage.getItem("newsList")) || [];

  adminList.innerHTML = "";

  newsList.forEach(news => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${news.title}</h3>
      <p>Tác giả: ${news.author}</p>
      <p class="status">Trạng thái: ${news.status}</p>
      <button class="approve">Duyệt</button>
      <button class="reject">Từ chối</button>
    `;

    div.querySelector(".approve").onclick = () => updateStatus(news.id, "approved");
    div.querySelector(".reject").onclick = () => updateStatus(news.id, "rejected");

    adminList.appendChild(div);
  });

  function updateStatus(id, status) {
    newsList = newsList.map(news => {
      if (news.id === id) {
        news.status = status;

        // 🔥 gửi thông báo
        sendNotification(news.author, 
          status === "approved"
          ? "Bài viết của bạn đã được duyệt"
          : "Bài viết của bạn đã bị từ chối"
        );
      }
      return news;
    });

    localStorage.setItem("newsList", JSON.stringify(newsList));
    location.reload();
  }

  function sendNotification(username, message) {
    let notifications = JSON.parse(localStorage.getItem("notifications")) || [];

    notifications.push({
      user: username,
      message: message,
      time: new Date().toLocaleString()
    });

    localStorage.setItem("notifications", JSON.stringify(notifications));
  }

});
const users = JSON.parse(localStorage.getItem("users")) || [];

users
  .filter(u => u.verifyStatus === "pending")
  .forEach(user => {
    const div = document.createElement("div");

    div.innerHTML = `
      <p>${user.fullname} - ${user.email}</p>
      <img src="${user.cccdImage}" width="200">
      <button onclick="approve(${user.id})">Duyệt</button>
      <button onclick="reject(${user.id})">Từ chối</button>
    `;

    document.body.appendChild(div);
  });

function approve(id) {
  const users = JSON.parse(localStorage.getItem("users"));
  const user = users.find(u => u.id === id);
  user.verifyStatus = "approved";
  localStorage.setItem("users", JSON.stringify(users));
  location.reload();
}

function reject(id) {
  const users = JSON.parse(localStorage.getItem("users"));
  const user = users.find(u => u.id === id);
  user.verifyStatus = "rejected";
  localStorage.setItem("users", JSON.stringify(users));
  location.reload();
}
</script>

</body>
</html>
