<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Admin - Duyệt bài</title>

<style>
body { font-family: Arial; background:#f4f6fa; padding:40px; }

.card {
  background:white;
  padding:20px;
  margin-bottom:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,.08);
}

button {
  padding:8px 14px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-right:10px;
}

.approve { background:#22c55e; color:white; }
.reject { background:#ef4444; color:white; }

.status { font-weight:bold; }

.cccd-img{
  width:220px;
  margin:10px;
  border-radius:8px;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<div id="navbar-container"></div>
<script src="navbar.js"></script>
<script>loadNavbar();</script>

<h1>Trang Admin Duyệt</h1>

<h2>Duyệt bài viết</h2>
<div id="adminList"></div>

<h2>Duyệt CCCD</h2>
<div id="verifyList"></div>

<script>

document.addEventListener("DOMContentLoaded", function () {

const adminList = document.getElementById("adminList");
const verifyList = document.getElementById("verifyList");

let newsList = JSON.parse(localStorage.getItem("newsList")) || [];
let users = JSON.parse(localStorage.getItem("users")) || [];

adminList.innerHTML = "";
verifyList.innerHTML = "";


// =============================
// DUYỆT BÀI VIẾT
// =============================

newsList.forEach(news => {

const div = document.createElement("div");
div.className = "card";

div.innerHTML = `
<h3>${news.title}</h3>
<p>Tác giả: ${news.author}</p>
<p class="status">Trạng thái: ${news.status}</p>

<button class="approve">Duyệt</button>
<button class="reject">Từ chối</button>
`;

div.querySelector(".approve").onclick = () => updateStatus(news.id,"approved");
div.querySelector(".reject").onclick = () => updateStatus(news.id,"rejected");

adminList.appendChild(div);

});

function updateStatus(id,status){

newsList = newsList.map(news=>{
if(news.id === id){

news.status = status;

sendNotification(
news.author,
status==="approved"
? "Bài viết của bạn đã được duyệt"
: "Bài viết của bạn đã bị từ chối"
);

}
return news;
});

localStorage.setItem("newsList",JSON.stringify(newsList));
location.reload();

}


// =============================
// DUYỆT CCCD
// =============================

users
.filter(u => u.verifyStatus === "pending")
.forEach(user=>{

const div = document.createElement("div");
div.className="card";

div.innerHTML = `
<p><b>${user.fullname}</b> - ${user.email}</p>

<p>Mặt trước CCCD:</p>
<img class="cccd-img" src="${user.cccd?.frontImage || ""}">

<p>Mặt sau CCCD:</p>
<img class="cccd-img" src="${user.cccd?.backImage || ""}">

<br>

<button class="approve">Duyệt</button>
<button class="reject">Từ chối</button>
`;

div.querySelector(".approve").onclick = ()=>approve(user.email);
div.querySelector(".reject").onclick = ()=>reject(user.email);

verifyList.appendChild(div);

});


// =============================
// APPROVE USER
// =============================

function approve(email){

let users = JSON.parse(localStorage.getItem("users")) || [];

users = users.map(u=>{
if(u.email === email){
u.verifyStatus="approved";
}
return u;
});

localStorage.setItem("users",JSON.stringify(users));

let currentUser = JSON.parse(localStorage.getItem("currentUser"));

if(currentUser && currentUser.email === email){
currentUser.verifyStatus="approved";
localStorage.setItem("currentUser",JSON.stringify(currentUser));
}

alert("Đã duyệt CCCD");

location.reload();

}


// =============================
// REJECT USER
// =============================

function reject(email){

let users = JSON.parse(localStorage.getItem("users")) || [];

users = users.map(u=>{
if(u.email === email){
u.verifyStatus="rejected";
}
return u;
});

localStorage.setItem("users",JSON.stringify(users));

let currentUser = JSON.parse(localStorage.getItem("currentUser"));

if(currentUser && currentUser.email === email){
currentUser.verifyStatus="rejected";
localStorage.setItem("currentUser",JSON.stringify(currentUser));
}

alert("Đã từ chối CCCD");

location.reload();

}


// =============================
// THÔNG BÁO
// =============================

function sendNotification(username,message){

let notifications = JSON.parse(localStorage.getItem("notifications")) || [];

notifications.push({
user:username,
message:message,
time:new Date().toLocaleString()
});

localStorage.setItem("notifications",JSON.stringify(notifications));

}

});
</script>

</body>
</html>
