<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chi tiết tin tức</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f6fa;
  margin: 0;
  padding: 40px;
}
#progressBar {
  position: fixed;
  top: 0;
  left: 0;
  height: 4px;
  background: #ff2e63;
  width: 0%;
  z-index: 999;
}
.news-detail {
  max-width: 800px;
  margin: auto;
  background: white;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

.news-detail h1 {
  margin-bottom: 20px;
}

/* Ảnh thumbnail phía trên (nếu có) */
#newsImage {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 20px;
}

/* Ảnh bên trong nội dung */
#newsContent img {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 15px auto;
  border-radius: 10px;
}
</style>
</head>
<div id="progressBar"></div>
<body>

<div id="navbar-container"></div>
<script src="navbar.js"></script>
<script>loadNavbar();</script>

<div class="news-detail">
  <h1 id="newsTitle"></h1>
  <img id="newsImage" style="display:none;">
  <div id="newsContent"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const params = new URLSearchParams(window.location.search);
  const id = Number(params.get("id"));

  const newsList = JSON.parse(localStorage.getItem("newsList")) || [];
  const news = newsList.find(n => n.id === id);

  if (!news) {
    document.querySelector(".news-detail").innerHTML =
      "<h2>Không tìm thấy bài viết</h2>";
    return;
  }

  if (news.status !== "approved") {
    document.querySelector(".news-detail").innerHTML =
      "<h2>Bài viết chưa được duyệt hoặc không tồn tại.</h2>";
    return;
  }

  document.getElementById("newsTitle").textContent = news.title;

  const contentEl = document.getElementById("newsContent");
  contentEl.innerHTML = news.content;

  // 🔥 Tự động chỉnh lại tất cả ảnh trong bài (phòng trường hợp ảnh có width lớn)
  const images = contentEl.querySelectorAll("img");
  images.forEach(img => {
    img.style.maxWidth = "100%";
    img.style.height = "auto";
    img.style.display = "block";
    img.style.margin = "15px auto";
  });

});
window.onscroll = () => {
  const scroll = document.documentElement.scrollTop;
  const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  const percent = (scroll / height) * 100;
  document.getElementById("progressBar").style.width = percent + "%";
};
</script>

</body>
</html>
