<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng nhập | Bất động sản</title>

<style>
* {
  box-sizing: border-box;
  font-family: "Segoe UI", system-ui, sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #eef2f3, #dfe9f3);
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

/* Language selector */
.language {
  position: absolute;
  top: 20px;
  right: 24px;
}

.language button {
  background: #ffffff;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  padding: 6px 10px;
  cursor: pointer;
  font-size: 16px;
}

.language-list {
  display: none;
  position: absolute;
  right: 0;
  margin-top: 8px;
  background: #ffffff;
  border-radius: 8px;
  box-shadow: 0 10px 25px rgba(0,0,0,.12);
  overflow: hidden;
  min-width: 140px;
}

.language-list a {
  display: block;
  padding: 10px 14px;
  font-size: 14px;
  color: #374151;
  text-decoration: none;
}

.language-list a:hover {
  background: #f1f5f9;
}

.language:hover .language-list {
  display: block;
}

/* Card */
.card {
  width: 380px;
  background: #fff;
  padding: 40px 32px;
  border-radius: 14px;
  box-shadow: 0 18px 45px rgba(0,0,0,.12);
}

.card h1 {
  text-align: center;
  margin-bottom: 8px;
  color: #1f2937;
}

.card p {
  text-align: center;
  font-size: 14px;
  color: #6b7280;
  margin-bottom: 30px;
}

.form-group {
  margin-bottom: 18px;
}

.form-group label {
  display: block;
  font-size: 14px;
  margin-bottom: 6px;
}

.form-group input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
}

.form-group input:focus {
  border-color: #2563eb;
  box-shadow: 0 0 0 3px rgba(37,99,235,.15);
}

.options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  margin-bottom: 22px;
}

.remember {
  display: flex;
  align-items: center;
  gap: 6px;
}

.options a {
  color: #2563eb;
  text-decoration: none;
}

button {
  width: 100%;
  padding: 12px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}

button:hover {
  background: #1e40af;
}

.footer {
  margin-top: 22px;
  text-align: center;
  font-size: 14px;
}

.footer a {
  color: #2563eb;
  text-decoration: none;
  font-weight: 500;
}
</style>
</head>

<body>
<!-- Language selector -->
 
<!-- Language selector -->
<div class="language">
  <button>🌍</button>
  <div class="language-list">
    <a href="#">Tiếng Việt</a>
    <a href="#">English</a>
    <a href="#">中文</a>
    <a href="#">日本語</a>
  </div>
</div>

<div class="card">
  <h1>Đăng nhập</h1>
  <p>Nền tảng mua bán & cho thuê bất động sản</p>


<form id="form">
  <div class="form-group">
    <label>Email</label>
    <input type="email" id="loginEmail" required>
  </div>

  <div class="form-group">
    <label>Mật khẩu</label>
    <input type="password" id="loginPassword" required>
  </div>

  <button type="submit">Đăng nhập</button>
</form>

  <p id="loginMessage"></p>

  <div class="footer">
    Chưa có tài khoản?
    <a href="register.html">Đăng ký</a>
  </div>
</div>

</body>
</html>
<script>

// =============================
// Nếu chưa có trạng thái đăng nhập → mặc định false
// =============================
if (localStorage.getItem("isLoggedIn") === null) {
  localStorage.setItem("isLoggedIn", "false");
}

const form = document.getElementById("form");
const loginMessage = document.getElementById("loginMessage");

form.addEventListener("submit", function (e) {
  e.preventDefault();

  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;

  if (!email || !password) {
    showLoginMessage("Vui lòng nhập đầy đủ thông tin", "red");
    return;
  }

  const users = JSON.parse(localStorage.getItem("users")) || [];

  const user = users.find(
    u => u.email === email && u.password === password
  );

  if (!user) {
    showLoginMessage("Email hoặc mật khẩu không đúng", "red");
    localStorage.setItem("isLoggedIn", "false");
    return;
  }

  // =============================
  // ĐĂNG NHẬP THÀNH CÔNG
  // =============================

  // Lưu TOÀN BỘ thông tin user
  localStorage.setItem("currentUser", JSON.stringify(user));

  localStorage.setItem("isLoggedIn", "true");

  showLoginMessage("Đăng nhập thành công 🎉", "green");

  setTimeout(() => {
    window.location.href = "home.html";
  }, 1000);
});

function showLoginMessage(text, color) {
  loginMessage.innerText = text;
  loginMessage.style.color = color;
}

</script>
