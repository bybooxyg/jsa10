<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chọn loại bài đăng</title>

<style>
:root {
  --primary: #0f2a44;
  --accent: #2563eb;
  --bg: #f4f6fa;
}

body {
  margin: 0;
  font-family: "Segoe UI", system-ui, sans-serif;
  background: var(--bg);
}

.container {
  max-width: 1100px;
  margin: 80px auto;
  padding: 0 20px;
  text-align: center;
}

h1 {
  margin-bottom: 40px;
  color: var(--primary);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 30px;
}

.card {
  background: #fff;
  padding: 40px 20px;
  border-radius: 16px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.05);
  cursor: pointer;
  transition: 0.25s;
}

.card:hover {
  transform: translateY(-6px);
}

.card h2 {
  margin-bottom: 10px;
  color: var(--primary);
}

.card p {
  color: #6b7280;
  font-size: 14px;
}
</style>
</head>

<body>
  <!-- navbar -->
   <div id="navbar-container"></div>

<script>
fetch("navbar.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("navbar").innerHTML = data;

    // Sau khi navbar load xong mới chạy JS
    const script = document.createElement("script");
    script.src = "navbar.js";
    document.body.appendChild(script);
  });
</script>
<!-- navbar end -->
<div class="container">
  <h1>Chọn loại bài đăng</h1>

  <div class="grid">

    <div class="card" onclick="goTo('post_sell.html')">
      <h2>🏠 Bán bất động sản</h2>
      <p>Đăng tin bán nhà, đất, căn hộ, dự án...</p>
    </div>

    <div class="card" onclick="goTo('post_rent.html')">
      <h2>🏢 Cho thuê</h2>
      <p>Đăng tin cho thuê nhà, phòng trọ, văn phòng...</p>
    </div>

    <div class="card" onclick="goTo('tutorial.html')">
      <h2>📈 Hướng dẫn đầu tư</h2>
      <p>Chia sẻ kiến thức, phân tích và kinh nghiệm đầu tư.</p>
    </div>

    <div class="card" onclick="goTo('post.html')">
      <h2>📰 Đăng bài báo</h2>
      <p>Đăng tin tức thị trường, thông báo, bài viết chuyên ngành.</p>
    </div>

  </div>
</div>

<script>
function goTo(page) {
  window.location.href = page;
}
</script>

</body>
</html>
