<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hồ sơ | Bất động sản</title>

<style>
:root {
  --primary: #0f2a44;
  --accent: #2563eb;
  --bg: #f4f6fa;
  --text: #374151;
}

* {
  box-sizing: border-box;
  font-family: "Segoe UI", system-ui, sans-serif;
}

body {
  margin: 0;
  background: var(--bg);
}

/* ===== NAVBAR (GIỐNG HOME) ===== */
.navbar {
  background: #fff;
  border-bottom: 1px solid #e5e7eb;
}

.nav-container {
  max-width: 1200px;
  margin: auto;
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 22px;
  font-weight: 700;
  color: var(--primary);
  text-decoration: none;
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 22px;
}

.nav-menu {
  display: flex;
  gap: 22px;
  align-items: center;
}

.nav-menu a {
  font-size: 14px;
  color: var(--text);
  text-decoration: none;
  font-weight: 500;
}

.nav-menu a:hover {
  color: var(--accent);
}

.post-btn {
  padding: 9px 16px;
  border-radius: 8px;
  background: var(--accent);
  color: #fff !important;
}

/* ===== USER BOX ===== */
.user-box {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 12px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.user-box:hover {
  background: #f3f4f6;
}

.user-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, #2563eb, #60a5fa);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 600;
  font-size: 14px;
  overflow: hidden;
}

.user-avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.user-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
}

/* ===== PROFILE SECTION ===== */
.profile-section {
  max-width: 1200px;
  margin: 50px auto 70px;
  padding: 0 20px;
}

.profile-card {
  background: #fff;
  border-radius: 14px;
  padding: 30px;
  box-shadow: 0 10px 25px rgba(0,0,0,.06);
}

.profile-header {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 30px;
}

.profile-avatar {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: linear-gradient(135deg, #2563eb, #60a5fa);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 28px;
  font-weight: 600;
  overflow: hidden;
}

.profile-avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.profile-info h2 {
  margin: 0;
  color: var(--primary);
}

.profile-info p {
  margin: 6px 0 0;
  color: #6b7280;
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
  gap: 20px;
}

.form-group {
  display: flex;
  flex-direction: column;
}

.form-group label {
  font-size: 14px;
  margin-bottom: 6px;
}

.form-group input,
.form-group textarea {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #e5e7eb;
}

.form-group textarea {
  resize: none;
  height: 100px;
}

.save-btn {
  margin-top: 25px;
  padding: 12px 22px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
}

.save-btn:hover {
  opacity: 0.9;
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {
  .nav-menu {
    display: none;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="nav-container">
    <a class="logo" href="home.html">RealEstate</a>

    <div class="nav-right">
      <nav class="nav-menu">
        <a href="#">Mua bán</a>
        <a href="#">Thuê</a>
        <a href="#">Dự án</a>
        <a href="#">Hướng dẫn đầu tư</a>
        <a href="#">Thuê chuyên gia</a>
        <a class="post-btn" href="#">Đăng bài</a>
      </nav>

      <div class="user-box" id="userBox">
        <div class="user-avatar" id="userAvatar"></div>
        <div class="user-name" id="userName"></div>
      </div>
    </div>
  </div>
</header>

<!-- PROFILE -->
<section class="profile-section">
  <div class="profile-card">

    <div class="profile-header">
      <div class="profile-avatar" id="profileAvatar"></div>
      <div class="profile-info">
        <h2 id="profileName"></h2>
        <p id="profileEmail"></p>
      </div>
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label>Họ và tên</label>
        <input type="text" id="username">
      </div>

      <div class="form-group">
        <label>Số điện thoại</label>
        <input type="text" id="phone">
      </div>

      <div class="form-group">
        <label>Địa chỉ</label>
        <input type="text" id="address">
      </div>

      <div class="form-group">
        <label>Link avatar</label>
        <input type="text" id="avatar">
      </div>

      <div class="form-group" style="grid-column: 1/-1;">
        <label>Giới thiệu</label>
        <textarea id="bio"></textarea>
      </div>
    </div>

    <button class="save-btn" onclick="saveProfile()">Lưu thay đổi</button>

  </div>
</section>

<script>
const isLoggedIn = localStorage.getItem("isLoggedIn");

if (isLoggedIn !== "true") {
  window.location.href = "login.html";
}

const currentUser = JSON.parse(localStorage.getItem("currentUser"));

/* ================= NAVBAR ================= */
const navAvatar = document.getElementById("userAvatar");
const navName = document.getElementById("userName");

navName.innerText = currentUser.username;

function renderNavbarAvatar(){
  if (currentUser.avatar && currentUser.avatar.trim() !== "") {
    navAvatar.innerHTML =
      `<img src="${currentUser.avatar}" 
            onerror="this.onerror=null;this.parentElement.innerText='${currentUser.username.charAt(0).toUpperCase()}'">`;
  } else {
    navAvatar.innerText =
      currentUser.username.charAt(0).toUpperCase();
  }
}

renderNavbarAvatar();

document.getElementById("userBox").addEventListener("click", () => {
  window.location.href = "profile.html";
});

/* ================= PROFILE ================= */
function renderProfile(){
  document.getElementById("profileName").innerText = currentUser.username;
  document.getElementById("profileEmail").innerText = currentUser.email;

  document.getElementById("username").value = currentUser.username || "";
  document.getElementById("phone").value = currentUser.phone || "";
  document.getElementById("address").value = currentUser.address || "";
  document.getElementById("avatar").value = currentUser.avatar || "";
  document.getElementById("bio").value = currentUser.bio || "";

  const profileAvatar = document.getElementById("profileAvatar");

  if (currentUser.avatar && currentUser.avatar.trim() !== "") {
    profileAvatar.innerHTML =
      `<img src="${currentUser.avatar}" 
            onerror="this.onerror=null;this.parentElement.innerText='${currentUser.username.charAt(0).toUpperCase()}'">`;
  } else {
    profileAvatar.innerText =
      currentUser.username.charAt(0).toUpperCase();
  }
}

renderProfile();

/* ================= SAVE ================= */
function saveProfile(){

  currentUser.username = document.getElementById("username").value.trim();
  currentUser.phone = document.getElementById("phone").value.trim();
  currentUser.address = document.getElementById("address").value.trim();
  currentUser.avatar = document.getElementById("avatar").value.trim();
  currentUser.bio = document.getElementById("bio").value.trim();

  let users = JSON.parse(localStorage.getItem("users")) || [];

  users = users.map(user =>
    user.email === currentUser.email ? currentUser : user
  );

  localStorage.setItem("users", JSON.stringify(users));
  localStorage.setItem("currentUser", JSON.stringify(currentUser));

  alert("Cập nhật thành công");

  /* cập nhật lại giao diện ngay */
  renderProfile();
  renderNavbarAvatar();
  navName.innerText = currentUser.username;
}
</script>


</body>
</html>
