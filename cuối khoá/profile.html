<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hồ sơ | Bất động sản</title>

<style>
.badge{
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
  color:white;
}

.none{ background:#6b7280; }
.pending{ background:#f59e0b; }
.approved{ background:#22c55e; }
.rejected{ background:#ef4444; }

:root{
  --primary:#0f2a44;
  --accent:#2563eb;
  --bg:#f4f6fa;
  --text:#374151;
}

*{box-sizing:border-box;font-family:"Segoe UI",system-ui,sans-serif;}
body{margin:0;background:var(--bg);}

/* NAVBAR */
.navbar{background:#fff;border-bottom:1px solid #e5e7eb;}
.nav-container{max-width:1200px;margin:auto;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;}
.logo{font-size:22px;font-weight:700;color:var(--primary);text-decoration:none;}
.nav-right{display:flex;align-items:center;gap:22px;}
.nav-menu{display:flex;gap:22px;align-items:center;}
.nav-menu a{font-size:14px;color:var(--text);text-decoration:none;font-weight:500;}
.nav-menu a:hover{color:var(--accent);}
.post-btn{padding:9px 16px;border-radius:8px;background:var(--accent);color:#fff!important;}

.user-box{display:flex;align-items:center;gap:10px;padding:6px 12px;border-radius:10px;cursor:pointer;}
.user-box:hover{background:#f3f4f6;}
.user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#60a5fa);display:flex;align-items:center;justify-content:center;color:white;font-weight:600;font-size:14px;overflow:hidden;}
.user-avatar img{width:100%;height:100%;object-fit:cover;}
.user-name{font-size:14px;font-weight:500;color:var(--text);}

/* PROFILE */
.profile-section{max-width:1200px;margin:50px auto 70px;padding:0 20px;}
.profile-card{background:#fff;border-radius:14px;padding:30px;box-shadow:0 10px 25px rgba(0,0,0,.06);}
.profile-header{display:flex;align-items:center;gap:24px;margin-bottom:30px;}
.profile-avatar{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#60a5fa);display:flex;align-items:center;justify-content:center;color:white;font-size:28px;font-weight:600;overflow:hidden;}
.profile-avatar img{width:100%;height:100%;object-fit:cover;}
.profile-info h2{margin:0;color:var(--primary);}
.profile-info p{margin:6px 0 0;color:#6b7280;}

.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;}
.form-group{display:flex;flex-direction:column;}
.form-group label{font-size:14px;margin-bottom:6px;}
.form-group input{padding:12px;border-radius:10px;border:1px solid #e5e7eb;}

.save-btn{margin-top:25px;padding:12px 22px;border-radius:10px;border:none;background:var(--accent);color:#fff;cursor:pointer;}
.save-btn:hover{opacity:0.9;}

.verify-box{margin-top:30px;padding:20px;border:1px dashed #ddd;border-radius:12px;background:#fafafa;}

@media(max-width:768px){.nav-menu{display:none;}}
</style>
</head>

<body>

<div id="navbar-container"></div>
<script src="navbar.js"></script>
<script>loadNavbar();</script>

<section class="profile-section">
  <div class="profile-card">

    <div class="profile-header">
      <div class="profile-avatar" id="profileAvatar"></div>
      <div class="profile-info">
        <h2 id="profileName"></h2>
        <p id="profileEmail"></p>
        <p>Trạng thái: <span id="verifyBadge" class="badge"></span></p>
      </div>
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label>Họ và tên</label>
        <input type="text" id="username">
      </div>

      <div class="form-group">
        <label>Số điện thoại</label>
        <input type="text" id="phone">
      </div>

      <div class="form-group">
        <label>Địa chỉ</label>
        <input type="text" id="address">
      </div>

      <div class="form-group">
        <label>Link avatar</label>
        <input type="text" id="avatar">
      </div>
    </div>

    <div class="verify-box" id="verifySection">
      <h3>Xác thực tài khoản</h3>

      <label>Ảnh CCCD mặt trước</label>
      <input type="file" id="cccdFront" accept="image/*">

      <br><br>

      <label>Ảnh CCCD mặt sau</label>
      <input type="file" id="cccdBack" accept="image/*">

      <button class="save-btn" type="button" onclick="submitVerify()">Gửi xác thực</button>
    </div>

    <button class="save-btn" onclick="saveProfile()">Lưu thay đổi</button>

  </div>
</section>

<script>

if(localStorage.getItem("isLoggedIn")!=="true"){
  window.location.href="login.html";
}

let currentUser=JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser.verifyStatus){
  currentUser.verifyStatus="none";
}

function renderProfile(){
  document.getElementById("profileName").innerText=currentUser.fullname || currentUser.username || "User";
  document.getElementById("profileEmail").innerText=currentUser.email;
  document.getElementById("username").value=currentUser.fullname || currentUser.username || "";
  document.getElementById("phone").value=currentUser.phone||"";
  document.getElementById("address").value=currentUser.address||"";
  document.getElementById("avatar").value=currentUser.avatar||"";

  const avatar=document.getElementById("profileAvatar");
  const displayName = currentUser.fullname || currentUser.username || "User";

  if(currentUser.avatar){
    avatar.innerHTML=`<img src="${currentUser.avatar}" onerror="this.onerror=null;this.parentElement.innerText='${displayName.charAt(0).toUpperCase()}'">`;
  }else{
    avatar.innerText=displayName.charAt(0).toUpperCase();
  }

  renderVerifyStatus();
}

renderProfile();

function renderVerifyStatus(){

  const badge=document.getElementById("verifyBadge");
  badge.className="badge";

  if(currentUser.verifyStatus==="approved"){
    badge.classList.add("approved");
    badge.innerText="Đã xác thực";
    document.getElementById("verifySection").style.display="none";
  }

  else if(currentUser.verifyStatus==="pending"){
    badge.classList.add("pending");
    badge.innerText="Đang chờ duyệt";
  }

  else if(currentUser.verifyStatus==="rejected"){
    badge.classList.add("rejected");
    badge.innerText="Bị từ chối";
  }

  else{
    badge.classList.add("none");
    badge.innerText="Chưa xác thực";
  }

}

function saveProfile(){

  currentUser.fullname=document.getElementById("username").value.trim();
  currentUser.phone=document.getElementById("phone").value.trim();
  currentUser.address=document.getElementById("address").value.trim();
  currentUser.avatar=document.getElementById("avatar").value.trim();

  let users=JSON.parse(localStorage.getItem("users"))||[];

  users=users.map(u=>u.email===currentUser.email?currentUser:u);

  localStorage.setItem("users",JSON.stringify(users));
  localStorage.setItem("currentUser",JSON.stringify(currentUser));

  alert("Cập nhật thành công");

  renderProfile();

}

async function submitVerify(){

  const FPT_API_KEY="ybZS5F1BQ7YCwHrm8NUSNOTIkWpS9ke4";

  const front=document.getElementById("cccdFront").files[0];
  const back=document.getElementById("cccdBack").files[0];

  if(!front||!back){
    alert("Vui lòng upload đủ 2 mặt CCCD");
    return;
  }

  const formData=new FormData();
  formData.append("image",front);

  try{
    
const response=await fetch("https://api.fpt.ai/vision/idr/vnm/",{
  method:"POST",
  headers:{
    "api_key": "ybZS5F1BQ7YCwHrm8NUSNOTIkWpS9ke4"
  },
  body:formData
});

const result=await response.json();

console.log("FPT RESULT:",result);

if(result.errorCode!==0){
  alert("Không đọc được CCCD");
  return;
}

if(!result.data || result.data.length===0){
  alert("Không đọc được thông tin CCCD");
  return;
}

const info=result.data[0];

    if(Number(info.id_prob)<0.8){
      alert("Ảnh CCCD không rõ");
      return;
    }

    const frontBase64=await fileToBase64(front);
    const backBase64=await fileToBase64(back);

    currentUser.verifyStatus="pending";

    currentUser.cccd={
      id:info.id,
      name:info.name,
      dob:info.dob,
      address:info.address,
      frontImage:frontBase64,
      backImage:backBase64
    };

    let users=JSON.parse(localStorage.getItem("users"))||[];

    users=users.map(u=>u.email===currentUser.email?currentUser:u);

    localStorage.setItem("users",JSON.stringify(users));
    localStorage.setItem("currentUser",JSON.stringify(currentUser));

    alert("Xác thực thành công! Chờ admin duyệt");

    renderVerifyStatus();

  }

  catch(err){

    console.error(err);

    alert("Lỗi kết nối FPT AI");

  }

}

function fileToBase64(file){

  return new Promise((resolve,reject)=>{

    const reader=new FileReader();

    reader.onload=()=>resolve(reader.result);

    reader.onerror=error=>reject(error);

    reader.readAsDataURL(file);

  });

console.log("SIZE:", front ? front.size : "no file");
}
console.log("FPT RESULT:",result);

</script>

</body>
</html>
