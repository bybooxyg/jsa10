<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Trang chủ | Bất động sản</title>

<style>
:root {
  --primary: #0f2a44;
  --accent: #2563eb;
  --bg: #f4f6fa;
  --text: #374151;
}

* {
  box-sizing: border-box;
  font-family: "Segoe UI", system-ui, sans-serif;
}

body {
  margin: 0;
  background: var(--bg);
}

/* ===== NAVBAR STYLE (dùng cho navbar.html) ===== */
.navbar {
  background: #fff;
  border-bottom: 1px solid #e5e7eb;
}

.nav-container {
  max-width: 1200px;
  margin: auto;
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 22px;
  font-weight: 700;
  color: var(--primary);
  text-decoration: none;
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 22px;
}

.nav-menu {
  display: flex;
  gap: 22px;
  align-items: center;
}

.nav-menu a {
  font-size: 14px;
  color: var(--text);
  text-decoration: none;
  font-weight: 500;
}

.nav-menu a:hover {
  color: var(--accent);
}

.post-btn {
  padding: 9px 16px;
  border-radius: 8px;
  background: var(--accent);
  color: #fff !important;
}

/* ===== USER BOX ===== */
.user-box {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 12px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.user-box:hover {
  background: #f3f4f6;
}

.user-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, #2563eb, #60a5fa);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 600;
  font-size: 14px;
  overflow: hidden;
}

.user-avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:50%;
}

.user-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
}

/* ===== HERO ===== */
.hero {
  max-width: 1200px;
  margin: 60px auto 30px;
  padding: 0 20px;
  text-align: center;
}

.hero h1 {
  font-size: 34px;
  color: var(--primary);
}

.hero p {
  color: #6b7280;
  margin: 14px 0 26px;
}

.search-box {
  display: flex;
  justify-content: center;
  gap: 12px;
}

.search-box input {
  width: 360px;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid #e5e7eb;
}

.search-box button {
  padding: 14px 22px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: white;
  cursor: pointer;
}

/* ===== NEWS ===== */
.news {
  max-width: 1200px;
  margin: 40px auto 70px;
  padding: 0 20px;
}

.news h2 {
  font-size: 22px;
  color: var(--primary);
  margin-bottom: 24px;
}

.news-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 24px;
}

.news-card {
  background: #fff;
  border-radius: 14px;
  padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,.06);
  transition: .2s;
  cursor: pointer;
}

.news-card:hover {
  transform: translateY(-4px);
}

.news-card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 12px;
}

@media (max-width: 768px) {
  .nav-menu {
    display: none;
  }
}
</style>
</head>

<body>

<!-- ===== NAVBAR LOAD TỪ FILE RIÊNG ===== -->
<div id="navbar-container"></div>
<script src="navbar.js"></script>

<script>
  loadNavbar();
</script>

<section class="hero">
  <h1>Nền tảng bất động sản uy tín</h1>
  <p>Mua bán • Cho thuê • Dự án • Đầu tư</p>

  <div class="search-box">
    <input type="text" placeholder="Tìm kiếm bài viết, dự án, khu vực...">
    <button>Tìm kiếm</button>
  </div>
</section>

<section class="news">
  <h2>Tin tức bất động sản</h2>
  <div class="news-grid" id="newsGrid"></div>
</section>
<script>
document.addEventListener("DOMContentLoaded", function () {

  const newsGrid = document.getElementById("newsGrid");
  if (!newsGrid) return;

  let newsList = JSON.parse(localStorage.getItem("newsList")) || [];

  // 🔥 CHỈ LẤY BÀI ĐÃ DUYỆT
  newsList = newsList.filter(news => news.status === "approved");

  if (newsList.length === 0) {
    newsGrid.innerHTML = "<p>Chưa có bài viết nào đã được duyệt.</p>";
    return;
  }

  newsList.sort((a, b) => b.id - a.id);

  newsList.forEach(news => {

    const card = document.createElement("div");
    card.className = "news-card";

    card.innerHTML = `
      ${news.thumbnail ? `<img src="${news.thumbnail}" alt="thumbnail">` : ""}
      <h3>${news.title}</h3>
      <p>${news.category || ""}</p>
    `;

    card.addEventListener("click", () => {
      window.location.href = "news.html?id=" + news.id;
    });

    newsGrid.appendChild(card);
  });

});
</script>

</body>
</html>
